###############################################################################
# k8s-deploy.yml — Runs on merge to main
# Deploys manifests to EKS cluster using Helm
###############################################################################

name: Kubernetes Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: "us-east-2"
  CLUSTER_NAME: "soc-eks-cluster"
  NAMESPACE: "soc-system"

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Deploy Helm chart
        run: |
          helm upgrade --install soc-stack helm/soc-stack \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.awsRegion=${{ env.AWS_REGION }} \
            --set global.environment=dev \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get daemonset -n ${{ env.NAMESPACE }}
