###############################################################################
# fluent-bit-configmap.yaml
# Fluent Bit replaces the CloudWatch Agent in the Kubernetes architecture
# Pipeline: /var/log/auth.log on each node → filter → CloudWatch Logs
#
# Why Fluent Bit over CloudWatch Agent in K8s?
# Fluent Bit is purpose-built for containerized log routing. It runs as a
# DaemonSet (one pod per node), understands Kubernetes metadata natively,
# and can enrich log lines with pod name, namespace, and node context before
# shipping. The CloudWatch Agent has no native Kubernetes awareness.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: soc-system
  labels:
    app: fluent-bit
    project: aws-soc-kubernetes
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

    # --- INPUT: Read auth.log from host node via hostPath volume ---
    [INPUT]
        Name              tail
        Tag               soc.auth
        Path              /var/log/auth.log
        Parser            syslog
        DB                /var/log/flb_auth.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # --- INPUT: Kubernetes container logs (all namespaces) ---
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    # --- FILTER: Enrich Kubernetes logs with pod/namespace metadata ---
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # --- FILTER: Tag auth.log failures for metric routing ---
    [FILTER]
        Name    grep
        Match   soc.auth
        Regex   log (Invalid user|Failed password|Permission denied|Connection closed)

    # --- OUTPUT: Ship auth.log to CloudWatch SOC-Auth-Logs group ---
    [OUTPUT]
        Name                cloudwatch_logs
        Match               soc.auth
        region              ${AWS_REGION}
        log_group_name      SOC-Auth-Logs
        log_stream_prefix   eks-node-
        auto_create_group   true
        log_retention_days  90

    # --- OUTPUT: Ship Kubernetes container logs to CloudWatch ---
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*
        region              ${AWS_REGION}
        log_group_name      /aws/eks/soc-cluster/containers
        log_stream_prefix   pod-
        auto_create_group   true
        log_retention_days  30

  parsers.conf: |
    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S

    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
