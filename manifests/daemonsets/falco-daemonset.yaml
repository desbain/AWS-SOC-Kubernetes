###############################################################################
# falco-daemonset.yaml
# Falco runs as a DaemonSet — one pod per node — monitoring kernel syscalls
# using eBPF. It replaces and surpasses the CloudWatch Metric Filter by
# detecting threats at the kernel level before log lines are written.
#
# Privileged mode is required: Falco needs access to the host kernel
# to read eBPF maps and intercept syscalls. This is the correct and
# expected security trade-off for a runtime threat detection agent.
###############################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: soc-system
  labels:
    app: falco
    project: aws-soc-kubernetes
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
        project: aws-soc-kubernetes
    spec:
      serviceAccountName: falco

      tolerations:
        - effect: NoSchedule
          operator: Exists

      hostNetwork: true
      hostPID: true

      initContainers:
        # Loads eBPF probe into the host kernel before Falco starts
        - name: falco-driver-loader
          image: falcosecurity/falco-driver-loader:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-usr
              mountPath: /usr

      containers:
        - name: falco
          image: falcosecurity/falco-no-driver:latest
          imagePullPolicy: Always

          securityContext:
            privileged: true  # Required for kernel-level syscall inspection

          args:
            - /usr/bin/falco
            - --cri=/run/containerd/containerd.sock
            - -K=/var/run/secrets/kubernetes.io/serviceaccount/token
            - -k=https://$(KUBERNETES_SERVICE_HOST)
            - --k8s-node=$(NODE_NAME)
            - -pk

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBERNETES_SERVICE_HOST
              value: kubernetes.default.svc

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: dev
              mountPath: /host/dev
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: boot
              mountPath: /host/boot
              readOnly: true
            - name: host-modules
              mountPath: /host/lib/modules
              readOnly: true
            - name: host-usr
              mountPath: /host/usr
              readOnly: true
            - name: falco-rules
              mountPath: /etc/falco/rules.d/
            - name: containerd-socket
              mountPath: /run/containerd/containerd.sock

      volumes:
        - name: dev
          hostPath: { path: /dev }
        - name: proc
          hostPath: { path: /proc }
        - name: boot
          hostPath: { path: /boot }
        - name: host-modules
          hostPath: { path: /lib/modules }
        - name: host-usr
          hostPath: { path: /usr }
        - name: falco-rules
          configMap:
            name: falco-rules
        - name: containerd-socket
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
