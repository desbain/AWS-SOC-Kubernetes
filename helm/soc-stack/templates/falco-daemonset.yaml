{{- if .Values.falco.enabled }}
###############################################################################
# falco-daemonset.yaml — DaemonSet rendered from values.falco
###############################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: {{ include "soc-stack.namespace" . }}
  labels:
    {{- include "soc-stack.labels" . | nindent 4 }}
    app: falco
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
        {{- include "soc-stack.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.rbac.falcoServiceAccount }}

      tolerations:
        - effect: NoSchedule
          operator: Exists

      hostNetwork: true
      hostPID: true

      initContainers:
        - name: falco-driver-loader
          image: "{{ .Values.falco.driverLoader.image.repository }}:{{ .Values.falco.driverLoader.image.tag }}"
          imagePullPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-usr
              mountPath: /usr

      containers:
        - name: falco
          image: "{{ .Values.falco.image.repository }}:{{ .Values.falco.image.tag }}"
          imagePullPolicy: {{ .Values.falco.image.pullPolicy }}

          securityContext:
            privileged: true

          args:
            - /usr/bin/falco
            - --cri=/run/containerd/containerd.sock
            - -K=/var/run/secrets/kubernetes.io/serviceaccount/token
            - -k=https://$(KUBERNETES_SERVICE_HOST)
            - --k8s-node=$(NODE_NAME)
            - -pk
            {{- if .Values.falco.output.stdout }}
            - --log-level={{ .Values.falco.output.priority | lower }}
            {{- end }}

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBERNETES_SERVICE_HOST
              value: kubernetes.default.svc

          resources:
            {{- toYaml .Values.falco.resources | nindent 12 }}

          volumeMounts:
            - name: dev
              mountPath: /host/dev
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: boot
              mountPath: /host/boot
              readOnly: true
            - name: host-modules
              mountPath: /host/lib/modules
              readOnly: true
            - name: host-usr
              mountPath: /host/usr
              readOnly: true
            {{- if .Values.falco.customRules.enabled }}
            - name: falco-rules
              mountPath: /etc/falco/rules.d/
            {{- end }}
            - name: containerd-socket
              mountPath: /run/containerd/containerd.sock

      volumes:
        - name: dev
          hostPath: { path: /dev }
        - name: proc
          hostPath: { path: /proc }
        - name: boot
          hostPath: { path: /boot }
        - name: host-modules
          hostPath: { path: /lib/modules }
        - name: host-usr
          hostPath: { path: /usr }
        {{- if .Values.falco.customRules.enabled }}
        - name: falco-rules
          configMap:
            name: falco-rules
        {{- end }}
        - name: containerd-socket
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket

{{- end }}
