{{- if .Values.falco.enabled }}
###############################################################################
# falco-daemonset.yaml — DaemonSet rendered from values.falco
###############################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: {{ include "soc-stack.namespace" . }}
  labels:
    {{- include "soc-stack.labels" . | nindent 4 }}
    app: falco
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
        {{- include "soc-stack.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.rbac.falcoServiceAccount }}
      tolerations:
        - effect: NoSchedule
          operator: Exists
      hostNetwork: true
      hostPID: true
      containers:
        - name: falco
          image: falcosecurity/falco:0.38.0
          imagePullPolicy: Always
          securityContext:
            privileged: true
          args:
            - /usr/bin/falco
            - --cri=/run/containerd/containerd.sock
            - -pk
            
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.falco.resources | nindent 12 }}
          volumeMounts:
            - name: dev
              mountPath: /host/dev
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: boot
              mountPath: /host/boot
              readOnly: true
            - name: host-modules
              mountPath: /host/lib/modules
              readOnly: true
            - name: host-usr
              mountPath: /host/usr
              readOnly: true
            - name: containerd-socket
              mountPath: /run/containerd/containerd.sock
            - name: falco-config
              mountPath: /etc/falco/config.d/falco-override.yaml
              subPath: falco.yaml
            {{- if .Values.falco.customRules.enabled }}
            - name: falco-rules
              mountPath: /etc/falco/rules.d/
            {{- end }}
      volumes:
        - name: dev
          hostPath: { path: /dev }
        - name: proc
          hostPath: { path: /proc }
        - name: boot
          hostPath: { path: /boot }
        - name: host-modules
          hostPath: { path: /lib/modules }
        - name: host-usr
          hostPath: { path: /usr }
        - name: containerd-socket
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: falco-config
          configMap:
            name: falco-config
        {{- if .Values.falco.customRules.enabled }}
        - name: falco-rules
          configMap:
            name: falco-rules
        {{- end }}
{{- end }}